spring:
  application:
    name: medsecure-hms

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update

      ddl-auto=create:show-sql: true

    defer-datasource-initialization: true
  sql:
    init:
      mode: always